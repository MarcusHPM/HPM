<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gas Dilution</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  margin: 0;
  padding: 10px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
}

/* TABLE STYLE (Excel-like) */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

td {
  border: 1px solid #333;
  padding: 8px;
}

/* COLOR CODING */
.label { background: #1c1c1c; }
.input  { background: #1e3a5f; }
.output { background: #3a1e2b; }
.note   { background: #222; font-size: 12px; color: #aaa; }

input {
  width: 100%;
  background: transparent;
  border: none;
  color: white;
  font-size: 14px;
  text-align: right;
  outline: none;
}

/* keypad */
.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 10px;
}

button {
  padding: 15px;
  font-size: 16px;
  background: #333;
  color: white;
  border: none;
  border-radius: 8px;
}
.result {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h2>Gas Dilution Calculator</h2>

<table>
<tr>
  <td class="label">Cylinder Concentration</td>
  <td class="input"><input id="cyl" onclick="setActive('cyl')" readonly></td>
  <td class="note">ppm</td>
</tr>

<tr>
  <td class="label">Target Concentration</td>
  <td class="input"><input id="target" onclick="setActive('target')" readonly></td>
  <td class="note">ppm</td>
</tr>

<tr>
  <td class="label">Total Bag Volume</td>
  <td class="input"><input id="total" onclick="setActive('total')" readonly></td>
  <td class="note">L</td>
</tr>

<tr>
  <td class="label">Gas Volume</td>
  <td class="output" id="gasVol">0</td>
  <td class="note">L</td>
</tr>

<tr>
  <td class="label">Air Volume</td>
  <td class="output" id="airVol">0</td>
  <td class="note">L</td>
</tr>

<tr>
  <td class="label">Gas Flow Rate</td>
  <td class="input"><input id="gflow" onclick="setActive('gflow')" readonly></td>
  <td class="note">L/min</td>
</tr>

<tr>
  <td class="label">Air Flow Rate</td>
  <td class="input"><input id="aflow" onclick="setActive('aflow')" readonly></td>
  <td class="note">L/min</td>
</tr>

<tr>
  <td class="label">Gas Fill Time</td>
  <td class="output" id="gasTime">00:00</td>
  <td class="note">min</td>
</tr>

<tr>
  <td class="label">Air Fill Time</td>
  <td class="output" id="airTime">00:00</td>
  <td class="note">min</td>
</tr>
</table>

<!-- KEYPAD -->
<div class="keypad">
  <button onclick="press(1)">1</button>
  <button onclick="press(2)">2</button>
  <button onclick="press(3)">3</button>
  <button onclick="press(4)">4</button>
  <button onclick="press(5)">5</button>
  <button onclick="press(6)">6</button>
  <button onclick="press(7)">7</button>
  <button onclick="press(8)">8</button>
  <button onclick="press(9)">9</button>
  <button onclick="press('.')">.</button>
  <button onclick="press(0)">0</button>
  <button onclick="clearField()">C</button>
</div>

</div>

<script>
let active = "cyl";

function setActive(id) {
  active = id;
}

function press(val) {
  let el = document.getElementById(active);
  el.value += val;
  calculate();
}

function clearField() {
  document.getElementById(active).value = "";
  calculate();
}

/* format mm:ss */
function formatTime(mins) {
  if (!isFinite(mins) || mins < 0) return "00:00";
  let m = Math.floor(mins);
  let s = Math.round((mins - m) * 60);
  if (s === 60) { m++; s = 0; }
  return String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
}

function calculate() {
  let cyl = parseFloat(document.getElementById("cyl").value);
  let target = parseFloat(document.getElementById("target").value);
  let total = parseFloat(document.getElementById("total").value);
  let gflow = parseFloat(document.getElementById("gflow").value);
  let aflow = parseFloat(document.getElementById("aflow").value);

  if (!cyl || !target || !total || !gflow || !aflow) return;

  if (target > cyl) return;

  let gasVol = (target / cyl) * total;
  let airVol = total - gasVol;

  let gasTime = gasVol / gflow;
  let airTime = airVol / aflow;

  document.getElementById("gasVol").innerText = gasVol.toFixed(2);
  document.getElementById("airVol").innerText = airVol.toFixed(2);

  document.getElementById("gasTime").innerText = formatTime(gasTime);
  document.getElementById("airTime").innerText = formatTime(airTime);
}
</script>

</body>
</html>
