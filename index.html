<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gas Dilution App</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 0;
  background: #111;
  color: white;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

input {
  width: 100%;
  padding: 14px;
  font-size: 18px;
  margin: 8px 0;
  text-align: center;
  border-radius: 10px;
  border: none;
}

.active {
  outline: 3px solid #00c3ff;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

button {
  padding: 18px;
  font-size: 18px;
  border-radius: 10px;
  border: none;
  background: #333;
  color: white;
}

.result {
  margin-top: 15px;
  font-size: 16px;
  text-align: left;
}
.error {
  color: #ff4d4d;
}
</style>
</head>

<body>

<div class="container">

<h2>Gas Dilution</h2>

<input id="cyl" placeholder="Cylinder ppm" onclick="setActive('cyl')" readonly>
<input id="target" placeholder="Target ppm" onclick="setActive('target')" readonly>
<input id="total" placeholder="Total Volume (L)" onclick="setActive('total')" readonly>
<input id="flow" placeholder="Flow Rate (L/min)" onclick="setActive('flow')" readonly>

<div class="keypad">
  <button onclick="press(1)">1</button>
  <button onclick="press(2)">2</button>
  <button onclick="press(3)">3</button>
  <button onclick="press(4)">4</button>
  <button onclick="press(5)">5</button>
  <button onclick="press(6)">6</button>
  <button onclick="press(7)">7</button>
  <button onclick="press(8)">8</button>
  <button onclick="press(9)">9</button>
  <button onclick="press('.')">.</button>
  <button onclick="press(0)">0</button>
  <button onclick="clearField()">C</button>
</div>

<div class="result" id="output"></div>

</div>

<script>
let active = "cyl";

function setActive(id) {
  active = id;
  document.querySelectorAll("input").forEach(i => i.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function press(val) {
  let el = document.getElementById(active);
  el.value += val;
  calculate();
}

function clearField() {
  document.getElementById(active).value = "";
  calculate();
}

function calculate() {
  let cyl = parseFloat(document.getElementById("cyl").value);
  let target = parseFloat(document.getElementById("target").value);
  let total = parseFloat(document.getElementById("total").value);
  let flow = parseFloat(document.getElementById("flow").value);

  let out = document.getElementById("output");

  // ---------------- ERROR CHECKING ----------------
  if (!cyl || !target || !total || !flow) {
    out.innerHTML = "";
    return;
  }

  if (cyl <= 0 || target <= 0 || total <= 0 || flow <= 0) {
    out.innerHTML = "<div class='error'>Values must be greater than 0</div>";
    return;
  }

  if (target > cyl) {
    out.innerHTML = "<div class='error'>Target ppm cannot exceed cylinder ppm</div>";
    return;
  }

  // ---------------- CALCULATIONS ----------------
  let gasVol = (target / cyl) * total;
  let airVol = total - gasVol;

  let gasTime = gasVol / flow;
  let airTime = airVol / flow;

  if (airVol < 0) {
    out.innerHTML = "<div class='error'>Invalid dilution result</div>";
    return;
  }

  out.innerHTML =
    `Gas Volume: ${gasVol.toFixed(3)} L<br>
     Air Volume: ${airVol.toFixed(3)} L<br><br>
     Gas Fill Time: ${gasTime.toFixed(2)} min<br>
     Air Fill Time: ${airTime.toFixed(2)} min`;
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
